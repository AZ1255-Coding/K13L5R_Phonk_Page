<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K13L5R Portfolio</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Audiowide&family=Bebas+Neue&family=Orbitron:wght@500&family=Teko:wght@600&family=Zen+Dots&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* cyber glow background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 25% 20%, rgba(128,0,255,0.25), transparent 45%),
        radial-gradient(circle at 75% 70%, rgba(0,255,255,0.12), transparent 50%);
      filter: blur(30px);
      animation: glowMove 8s ease-in-out infinite alternate;
      z-index: -1;
    }

    @keyframes glowMove {
      0% { transform: scale(1); opacity: 0.7; }
      100% { transform: scale(1.1); opacity: 1; }
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(to bottom, #1a001f, #000);
    }

    h1 {
      font-family: 'Audiowide', sans-serif;
      font-size: 5rem;
      color: #b300ff;
      letter-spacing: 0.3rem;
      text-shadow: 0 0 10px #8000ff, 0 0 25px #4b0082;
      animation: flicker 4s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.92; }
      52% { opacity: 0.75; }
      54% { opacity: 1; }
    }

    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.15rem;
      margin-top: 1rem;
      color: #ddd;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: #6a0dad;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      transition: 0.25s;
      box-shadow: 0 0 15px rgba(128,0,255,0.3);
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 25px rgba(128,0,255,0.6);
    }

    .section {
      padding: 5rem 2rem;
      max-width: 1100px;
      margin: auto;
    }

    .section h2 {
      font-family: 'Teko', sans-serif;
      color: #8000ff;
      margin-bottom: 2rem;
      text-align: center;
      font-size: 3rem;
      text-shadow: 0 0 10px rgba(128,0,255,0.5);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: #111;
      padding: 1.5rem;
      border-radius: 20px;
      text-align: center;
      transition: 0.25s;
      border: 1px solid #1f1f1f;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 20px rgba(128,0,255,0.35);
    }

    .cover {
      height: 200px;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08rem;
    }

    .about-text {
      font-family: 'Zen Dots', cursive;
      text-align: center;
      font-size: 1.1rem;
      line-height: 1.8;
      max-width: 900px;
      margin: auto;
      color: #ddd;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    footer {
      font-family: 'Anton', sans-serif;
      text-align: center;
      padding: 2rem;
      color: #666;
      border-top: 1px solid #222;
      letter-spacing: 0.08rem;
    }
  </style>
</head>

<body>

    <a class="btn" href="https://www.youtube.com/@K13L5R_PHONKS" target="_blank">LISTEN NOW</a>
  </section>

          <div class="cover"
            style="background-image:url('https://github.com/AZ1255-Coding/K13L5R_Phonk_Page/raw/main/ChatGPT%20Image%20May%209%2C%202026%2C%2008_00_59%20PM.png');">
          </div>

      <div class="card">
        <a href="https://www.youtube.com/watch?v=m9RsjX0JKcw" target="_blank">
          <div class="cover"
            style="background-image:url('https://github.com/AZ1255-Coding/K13L5R_Phonk_Page/raw/main/ChatGPT%20Image%20May%2010%2C%202026%2C%2012_01_21%20PM.png');">
          </div>

      <div class="card">
        <a href="https://www.youtube.com/watch?v=zHkcCb1vY5M" target="_blank">
          <div class="cover"
            style="background-image:url('https://github.com/AZ1255-Coding/K13L5R_Phonk_Page/raw/main/ChatGPT%20Image%20May%2023%2C%202026%2C%2009_55_10%20AM.png');">

        </a>
      </div>

  </section>

  <section class="section" style="background:#090909; max-width:none;">
    <h2>ABOUT</h2>

      A dark phonk project built for drift culture, raw bass, and pure adrenaline.

  <footer>
    © 2026 K13L5R — All Rights Reserved

</body>
</html>
