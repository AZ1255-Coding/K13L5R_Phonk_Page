<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K13L5R Portfolio</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Audiowide&family=Bebas+Neue&family=Orbitron:wght@500&family=Teko:wght@600&family=Zen+Dots&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(to bottom, #2e003e, #000);
    }

    h1 {
      font-family: 'Audiowide', sans-serif;
      font-size: 5rem;
      color: #8000ff;
      letter-spacing: 0.3rem;
    }

    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.15rem;
      margin-top: 1rem;
    }

    .btn {
      font-family: 'Orbitron', sans-serif;
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: #6a0dad;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .section {
      padding: 5rem 2rem;
      max-width: 1100px;
      margin: auto;
    }

    .section h2 {
      font-family: 'Teko', sans-serif;
      color: #8000ff;
      margin-bottom: 2rem;
      text-align: center;
      font-size: 3rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 1.5rem;
    }

    .card {
      background: #111;
      padding: 1.5rem;
      border-radius: 20px;
      text-align: center;
    }

    .cover {
      height: 200px;
      background: linear-gradient(135deg, #4b0082, #000);
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    .card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08rem;
    }

    .about-text {
      font-family: 'Zen Dots', cursive;
      text-align: center;
      font-size: 1.1rem;
      line-height: 1.8;
      max-width: 900px;
      margin: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    footer {
      font-family: 'Anton', sans-serif;
      text-align: center;
      padding: 2rem;
      color: #777;
      border-top: 1px solid #222;
      letter-spacing: 0.08rem;
    }
  </style>
</head>
<body>

  <section class="hero">
    <h1>K13L5R</h1>
    <p class="subtitle">Underground Phonk Producer • Graveyard Energy • Raw Drift Chaos</p>
    <a class="btn" href="https://www.youtube.com/@K13L5R_PHONKS" target="_blank">LISTEN NOW</a>
  </section>

  <section class="section">
    <h2>LATEST RELEASES</h2>
    <div class="grid">
      <div class="card">
        <div class="cover"></div>
        <a href="https://www.youtube.com/watch?v=OO7b-3Ug86E" target="_blank">
          <h3>ABSOLUTE DECAY</h3>
        </a>
      </div>

      <div class="card">
        <div class="cover"></div>
        <a href="https://www.youtube.com/watch?v=m9RsjX0JKcw" target="_blank">
          <h3>COLLAPSE</h3>
        </a>
      </div>
    </div>
  </section>

  <section class="section" style="background:#090909; max-width:none;">
    <h2>ABOUT</h2>
    <p class="about-text">A dark phonk project built for drift culture, raw bass, and pure adrenaline.</p>
  </section>

  <footer>
    © 2026 K13L5R — All Rights Reserved
  </footer>

</body>
</html>
