<!DOCTYPE html>
<html lang="en">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #000; color: #fff; }
    .hero { min-height: 100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding: 2rem; background: linear-gradient(to bottom, #2a0000, #000); }

    .section { padding: 5rem 2rem; max-width: 1100px; margin:auto; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap: 1.5rem; }
    .card { background:#111; padding:1.5rem; border-radius:20px; text-align:center; }
    .cover { height:200px; background: linear-gradient(135deg, #990000, #000); border-radius:12px; margin-bottom:1rem; }
    a { color: inherit; text-decoration: none; }
    footer { text-align:center; padding:2rem; color:#777; border-top:1px solid #222; }
  </style>
</head>

        <a href="https://www.youtube.com/watch?v=m9RsjX0JKcw" target="_blank"><h3>COLLAPSE</h3></a>

    </div>

  </section>
